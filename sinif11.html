<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çok Yakında | Boğaziçi Koleji Tarih Portalı</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Ana Sayfa (Mihenk Taşı) Renk Paleti */
            --bg-paper: #F6F4EE; /* Fildişi / Krem Arka Plan */
            --card-white: #FFFFFF;
            --text-dark: #1A1A1A;
            --text-muted: #6B6B6B;
            --accent-11: #2B6B7A; /* 11. Sınıf Petrol Mavisi */
            --accent-12: #A33327; /* 12. Sınıf Kiremit Kırmızısı */
            --btn-dark: #1A1A1A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-paper);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* --- Üst Başlık Grubu (Ana Sayfadaki Gibi) --- */
        .header-group {
            text-align: center;
            margin-bottom: 40px;
        }

        .school-name {
            font-family: monospace; /* Daktilo / Kodlama hissi */
            font-size: 11px;
            letter-spacing: 4px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -1px;
        }

        /* --- Ana Beyaz Kart --- */
        .coming-card {
            background-color: var(--card-white);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.04);
            padding: 50px 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ana Sayfadaki Dikey "SINIF" Tasarımına Atıf */
        .grade-badges {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-bottom: 30px;
        }

        .grade-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .grade-num {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 900;
        }

        .grade-num.blue { color: var(--accent-11); }
        .grade-num.red { color: var(--accent-12); }

        .grade-text {
            font-family: monospace;
            font-size: 9px;
            color: var(--text-muted);
            writing-mode: vertical-rl;
            text-orientation: mixed;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .divider-amp {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: #D1D1D1;
            font-style: italic;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card-desc {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* Zarif Yüklenme Çubuğu */
        .loader-container {
            width: 100%;
            height: 3px;
            background-color: #F0F0F0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
            position: relative;
        }

        .loader-bar {
            height: 100%;
            width: 30%;
            background-color: var(--text-dark);
            border-radius: 3px;
            animation: loading 2s infinite ease-in-out alternate;
        }

        @keyframes loading {
            0% { width: 10%; transform: translateX(0); }
            100% { width: 40%; transform: translateX(250%); }
        }

        .loader-text {
            font-family: monospace;
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- En Alt İmza ve Butonlar (Ana Sayfadaki Gibi) --- */
        .footer-section {
            margin-top: 50px;
            text-align: center;
        }

        .signature {
            font-family: monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .pill-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn-pill {
            background-color: var(--btn-dark);
            color: #FFFFFF;
            padding: 10px 20px;
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-pill:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        @media (max-width: 600px) {
            .main-title { font-size: 42px; }
            .coming-card { padding: 40px 25px; }
            .grade-num { font-size: 38px; }
            .school-name { font-size: 9px; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

    <div class="header-group">
        <div class="school-name">Özel Batman Boğaziçi Koleji MTAL</div>
        <h1 class="main-title">Tarih Portalı</h1>
    </div>

    <div class="coming-card">
        
        <div class="grade-badges">
            <div class="grade-item">
                <span class="grade-num blue">11</span>
                <span class="grade-text">SINIF</span>
            </div>
            <span class="divider-amp">&amp;</span>
            <div class="grade-item">
                <span class="grade-num red">12</span>
                <span class="grade-text">SINIF</span>
            </div>
        </div>

        <div class="card-title">Modüller Hazırlanıyor</div>
        <p class="card-desc">Devrim ve Değişim Çağı ile Cumhuriyet dönemi eğitim modülleri çok yakında erişime açılacaktır.</p>

        <div class="loader-container">
            <div class="loader-bar"></div>
        </div>
        <div class="loader-text">Sistem İnşası Sürüyor...</div>

    </div>

    <div class="footer-section">
        <div class="signature">Tasarım ve Kodlama: Murat Mutlu, Tarih Öğretmeni</div>
        <div class="pill-buttons">
            <a href="index.html" class="btn-pill">Portal V1.0</a>
            <a href="mailto:murat@kirkyama.uk" class="btn-pill">
                <i class="fa-solid fa-envelope"></i>
            </a>
        </div>
    </div>

</body>
</html>
